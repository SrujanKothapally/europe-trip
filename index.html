<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venice → Lucerne | Gotthard Panorama Express</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
        #map { width: 100%; height: 100vh; }
        .mapboxgl-canvas { outline: none; }
        .city-marker-3d { text-align: center; cursor: pointer; }
        .marker-dot-3d { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 3px 12px rgba(0,0,0,0.3); border: 3px solid #fff; margin: 0 auto; }
        .marker-name-3d { font-size: 0.75rem; font-weight: 700; color: #333; background: #fff; padding: 3px 10px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.12); margin-top: 4px; display: inline-block; }
        .nav-icon { font-size: 1.8rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); pointer-events: none; z-index: 2000; }
        #start-btn { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 1000; background: #1976D2; color: #fff; border: none; padding: 14px 32px; border-radius: 30px; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(25,118,210,0.4); transition: all 0.2s; }
        #start-btn:hover { background: #1565C0; transform: translateX(-50%) scale(1.05); }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="start-btn">▶ Start Journey</button>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
